# Render Blueprint - Backend Deployment Configuration
# This file configures automatic deployment on Render

services:
  - type: web
    name: second-brain-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: VECTOR_DB_PATH
        value: /opt/render/project/src/data/vector_store
      - key: SQLITE_DB_PATH
        value: /opt/render/project/src/data/episodic.db
    healthCheckPath: /health
    autoDeploy: true
